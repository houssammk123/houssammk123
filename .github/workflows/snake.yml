# ============================================================
#  Snake Contribution Animation
#  ► In your  houssammk123  repo, place this file at:
#       .github/workflows/snake.yml
#  ► Then go to the repo's  Actions  tab and enable workflows.
#  ► It runs every 12h (and on demand) and pushes the generated
#    SVGs to an "output" branch, which the README points to.
# ============================================================
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # allows manual run from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: houssammk123
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
